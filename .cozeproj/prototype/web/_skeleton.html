<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（杂志风：黑白克制） === */
      --color-primary:              #111111;
      --color-primary-container:    #2A2A2A;
      --color-on-primary:           #F4F1EA;
      /* === 背景 / 表面（暖色纸张底色） === */
      --color-background:                 #F4F1EA;
      --color-surface-container-lowest:   #F8F6F0;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EDE9E0;
      --color-surface-container-high:     #E4DFD4;
      --color-surface-container-highest:  #D8D1C4;
      /* === 文字 === */
      --color-on-surface:           #111111;
      --color-on-surface-variant:   #6B665E;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #D8D1C4;
      --color-outline-variant:  #D8D1C4;
      /* === 圆角 === */
      --radius-sm:   0.125rem;
      --radius-md:   0.25rem;
      --radius-lg:   0.375rem;
      --radius-xl:   0.5rem;
      --radius-2xl:  0.75rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.16);
      /* === 字体 === */
      --font-sans: "Noto Serif SC", Georgia, "Times New Roman", system-ui, serif;
      --font-display: "Playfair Display", "Noto Serif SC", Georgia, serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-surface sticky top-0 z-40 border-b border-outline-variant/20">
    <div class="max-w-7xl mx-auto h-14 flex items-center justify-between px-6">
      <a href="home.html" class="flex items-center gap-2">
        <i data-lucide="zap" class="text-primary w-5 h-5"></i>
        <span class="font-display font-bold text-lg text-on-surface">AI Pulse</span>
      </a>
      <nav class="flex items-center gap-1">
        <a href="home.html" class="px-3 py-1.5 text-sm font-medium text-on-primary bg-primary rounded-md"
           aria-current="page">首页</a>
        <a href="/daily" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant
                           hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">日报</a>
        <a href="/leaderboard" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant
                           hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">排行榜</a>
        <a href="/admin" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant
                           hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">管理</a>
      </nav>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <!-- @main-content:start -->
  <main class="max-w-7xl mx-auto px-6 py-8">
  </main>
  <!-- @main-content:end -->

  <script>lucide.createIcons();</script>
</body>

</html>
